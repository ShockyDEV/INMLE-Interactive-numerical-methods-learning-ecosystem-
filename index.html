<script>
/* KaTeX en cascada: vendor local (offline) → CDN → si nada, mathtext.js usa
   su propio fallback HTML y todo sigue siendo legible. */
(function () {
  var d = document;
  function css(href, onerr) {
    var l = d.createElement('link');
    l.rel = 'stylesheet'; l.href = href;
    if (onerr) l.onerror = onerr;
    d.head.appendChild(l);
  }
  function js(src, onerr) {
    var s = d.createElement('script');
    s.src = src; s.defer = true;
    if (onerr) s.onerror = onerr;
    d.head.appendChild(s);
  }
  var CDN = 'https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/';
  css('vendor/katex/katex.min.css', function () { css(CDN + 'katex.min.css'); });
  js('vendor/katex/katex.min.js', function () { js(CDN + 'katex.min.js'); });
})();
</script>
